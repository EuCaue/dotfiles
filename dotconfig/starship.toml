"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = 'night_owl'

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$docker_context\
$cmd_duration\
$time\
$line_break\
$character"""

[fill]
symbol = " "

[os]
disabled = false
style = "bold sapphire"
format = "[$symbol ]($style)"

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"

[username]
show_always = false
style_user = "bold sapphire"
style_root = "bold red"
format = "[$user]($style) "

[directory]
style = "bold lavender"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "bold peach"
format = "[$symbol $branch]($style) "

[git_status]
style = "bold red"
format = "[$all_status$ahead_behind]($style) "

[c]
symbol = "¯ÿ×"
style = "bold green"
format = "[$symbol $version]($style) "

[rust]
symbol = "¯×¿"
style = "bold peach"
format = "[$symbol $version]($style) "

[golang]
symbol = "¯ÿº"
style = "bold sapphire"
format = "[$symbol $version]($style) "

[nodejs]
symbol = "¯£ÿ"
style = "bold green"
format = "[$symbol $version]($style) "

[bun]
symbol = "¯Ø»"
style = "bold peach"
format = "[$symbol $version]($style) "

[php]
symbol = "¯ÿê"
style = "bold lavender"
format = "[$symbol $version]($style) "

[java]
symbol = "¯ëû"
style = "bold peach"
format = "[$symbol $version]($style) "

[kotlin]
symbol = "¯ÿ┤"
