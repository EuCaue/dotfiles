session_name: dotfiles
start_directory: ~/dotfiles

windows:
  - window_name: dotfiles
    start_directory: ~/dotfiles
    panes:
      - zsh

  - window_name: dotconfig
    start_directory: ~/dotfiles/dotconfig
    panes:
      - zsh

  - window_name: scripts
    start_directory: ~/dotfiles/scripts
    panes:
      - zsh
